def resolveRobotBuildFile = {
    def groovyBuild = file("$rootDir/build.gradle")
    if (groovyBuild.isFile()) {
        return groovyBuild
    }
    def ktsBuild = file("$rootDir/build.gradle.kts")
    if (ktsBuild.isFile()) {
        return ktsBuild
    }
    throw new GradleException("Could not find build.gradle or build.gradle.kts at ${rootDir}")
}

def readText = { File source ->
    source.isFile() ? source.getText('UTF-8') : ''
}

def resolveSettingsFile = {
    def groovySettings = file("$rootDir/settings.gradle")
    if (groovySettings.isFile()) {
        return groovySettings
    }
    def ktsSettings = file("$rootDir/settings.gradle.kts")
    if (ktsSettings.isFile()) {
        return ktsSettings
    }
    throw new GradleException("Could not find settings.gradle or settings.gradle.kts at ${rootDir}")
}

def upsertAthenaPluginInBuildFile = { File buildFile, String version ->
    boolean kts = buildFile.name.toLowerCase(Locale.ROOT).endsWith('.kts')
    String athenaLine = kts
            ? "    id(\"ca.frc6390.athena.plugin\") version \"${version}\""
            : "    id \"ca.frc6390.athena.plugin\" version \"${version}\""
    String original = readText(buildFile)

    def existingPattern = kts
            ? ~/(?m)^\s*id\(\s*"ca\.frc6390\.athena\.plugin"\s*\)\s*(version\s*"[^"]+")?\s*$/
            : ~/(?m)^\s*id\s*["']ca\.frc6390\.athena\.plugin["']\s*(version\s*["'][^"']+["'])?\s*$/
    if ((original =~ existingPattern).find()) {
        String updated = original.replaceFirst(existingPattern, athenaLine)
        buildFile.write(updated, 'UTF-8')
        return
    }

    def pluginsBlockPattern = ~/(?s)(plugins\s*\{)(.*?)(\})/
    def matcher = pluginsBlockPattern.matcher(original)
    if (!matcher.find()) {
        throw new GradleException(
                "Could not find plugins { } block in ${buildFile}. " +
                        "Add Athena plugin manually: ${athenaLine.trim()}"
        )
    }
    String replacement = matcher.group(1) + matcher.group(2) + "\n" + athenaLine + "\n" + matcher.group(3)
    String updated = original.substring(0, matcher.start()) + replacement + original.substring(matcher.end())
    buildFile.write(updated, 'UTF-8')
}

def removeAthenaPluginFromBuildFile = { File buildFile ->
    boolean kts = buildFile.name.toLowerCase(Locale.ROOT).endsWith('.kts')
    String original = readText(buildFile)
    def linePattern = kts
            ? ~/(?m)^\s*id\(\s*"ca\.frc6390\.athena\.plugin"\s*\)\s*(version\s*"[^"]+")?\s*\n?/
            : ~/(?m)^\s*id\s*["']ca\.frc6390\.athena\.plugin["']\s*(version\s*["'][^"']+["'])?\s*\n?/
    String updated = original.replaceFirst(linePattern, '')
    if (updated != original) {
        buildFile.write(updated, 'UTF-8')
        return true
    }
    return false
}

def ensureAthenaRepoInSettings = { File settingsFile ->
    String original = readText(settingsFile)
    if (original.contains(athenaBootstrapConfig.athenaMavenUrl)) {
        return false
    }

    boolean kts = settingsFile.name.toLowerCase(Locale.ROOT).endsWith('.kts')
    String bootstrapBlock = kts
            ? "        maven(url = \"${athenaBootstrapConfig.athenaMavenUrl}\")"
            : "        maven { url '${athenaBootstrapConfig.athenaMavenUrl}' }"
    String updated = original

    if (original.contains('gradlePluginPortal()')) {
        updated = original.replaceFirst(
                /gradlePluginPortal\(\)/,
                "gradlePluginPortal()\n${bootstrapBlock}"
        )
    } else if (original.contains('mavenLocal()')) {
        updated = original.replaceFirst(
                /mavenLocal\(\)/,
                "mavenLocal()\n${bootstrapBlock}"
        )
    } else {
        throw new GradleException(
                "Could not inject Athena plugin repo into ${settingsFile}. " +
                        "Please add repository manually: ${athenaBootstrapConfig.athenaMavenUrl}"
        )
    }

    settingsFile.write(updated, 'UTF-8')
    return true
}

def ensureAthenaPluginIncludeBuildInSettings = { File settingsFile, File athenaRepo ->
    if (settingsFile == null || !settingsFile.isFile()) {
        return false
    }

    String original = readText(settingsFile)
    boolean kts = settingsFile.name.toLowerCase(Locale.ROOT).endsWith('.kts')

    String optionalIncludeBuildBlock = kts
            ? """    // Athena optional local plugin override (generated by athenaBootstrap)
    val athenaLocalRepoDir = gradle.startParameter.projectProperties["athenaRepoDir"]
            ?: System.getProperty("athenaRepoDir")
            ?: System.getenv("ATHENA_REPO_DIR")
    val athenaPluginCandidates = mutableListOf<File>()
    if (!athenaLocalRepoDir.isNullOrBlank()) {
        val athenaOverrideBase = File(athenaLocalRepoDir.trim())
        athenaPluginCandidates.add(athenaOverrideBase)
        athenaPluginCandidates.add(File(athenaOverrideBase, "athena-plugin"))
    }
    athenaPluginCandidates.add(File(settingsDir, "../FRC-Athena/athena-plugin"))
    athenaPluginCandidates.add(File(settingsDir, "../frc-athena/athena-plugin"))
    val athenaUserHome = System.getProperty("user.home")
    if (!athenaUserHome.isNullOrBlank()) {
        athenaPluginCandidates.add(File(athenaUserHome, "Documents/GitHub/FRC-Athena/athena-plugin"))
        athenaPluginCandidates.add(File(athenaUserHome, "GitHub/FRC-Athena/athena-plugin"))
    }
    for (athenaCandidate in athenaPluginCandidates) {
        val athenaNormalized = athenaCandidate.canonicalFile
        val hasGradleBuildFile =
                File(athenaNormalized, "build.gradle.kts").exists() ||
                        File(athenaNormalized, "build.gradle").exists()
        if (athenaNormalized.exists() && hasGradleBuildFile) {
            includeBuild(athenaNormalized.toString().replace("\\\\", "/"))
            break
        }
    }
    // Athena optional local plugin override end"""
            : """    // Athena optional local plugin override (generated by athenaBootstrap)
    def athenaLocalRepoDir =
            gradle.startParameter.projectProperties['athenaRepoDir']
                    ?: System.getProperty('athenaRepoDir')
                    ?: System.getenv('ATHENA_REPO_DIR')
    def athenaPluginCandidates = []
    if (athenaLocalRepoDir != null && !athenaLocalRepoDir.toString().trim().isEmpty()) {
        def athenaOverrideBase = new File(athenaLocalRepoDir.toString().trim())
        athenaPluginCandidates.add(athenaOverrideBase)
        athenaPluginCandidates.add(new File(athenaOverrideBase, 'athena-plugin'))
    }
    athenaPluginCandidates.add(new File(settingsDir, '../FRC-Athena/athena-plugin'))
    athenaPluginCandidates.add(new File(settingsDir, '../frc-athena/athena-plugin'))
    def athenaUserHome = System.getProperty('user.home')
    if (athenaUserHome != null && !athenaUserHome.toString().trim().isEmpty()) {
        athenaPluginCandidates.add(new File(athenaUserHome.toString().trim(), 'Documents/GitHub/FRC-Athena/athena-plugin'))
        athenaPluginCandidates.add(new File(athenaUserHome.toString().trim(), 'GitHub/FRC-Athena/athena-plugin'))
    }
    for (File athenaCandidate : athenaPluginCandidates) {
        if (athenaCandidate == null) {
            continue
        }
        def athenaNormalized = athenaCandidate.canonicalFile
        def hasGradleBuildFile = new File(athenaNormalized, 'build.gradle').exists()
                || new File(athenaNormalized, 'build.gradle.kts').exists()
        if (athenaNormalized.exists() && hasGradleBuildFile) {
            includeBuild(athenaNormalized)
            break
        }
    }
    // Athena optional local plugin override end"""

    String updated = original
    // Remove old generated optional block if present so it can be re-inserted in canonical form.
    updated = updated.replaceAll(
            /(?ms)^\s*\/\/ Athena optional local plugin override \(generated by athenaBootstrap\).*?^\s*\/\/ Athena optional local plugin override end\s*\r?\n?/,
            ''
    )
    // Remove hardcoded athena-plugin includeBuild lines to avoid machine-specific paths.
    updated = updated.replaceAll(
            /(?m)^\s*includeBuild\(\s*["'][^"']*athena-plugin[^"']*["']\s*\)\s*\r?\n?/,
            ''
    )

    def pluginManagementPattern = ~/(?s)(pluginManagement\s*\{)/
    def matcher = pluginManagementPattern.matcher(updated)
    if (!matcher.find()) {
        throw new GradleException(
                "Could not inject Athena optional plugin includeBuild logic into ${settingsFile}. " +
                        "Please add the athena optional includeBuild block inside pluginManagement { }."
        )
    }

    updated = updated.substring(0, matcher.end()) + "\n${optionalIncludeBuildBlock}" + updated.substring(matcher.end())
    if (updated == original) {
        return false
    }
    settingsFile.write(updated, 'UTF-8')
    return true
}

def dslConfigured = {
    File buildFile = resolveRobotBuildFile()
    String body = readText(buildFile)
    return body.contains('ca.frc6390.athena.plugin')
}

def athenaDslJdtExports = [
        '--add-exports=jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
        '--add-exports=jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED'
]

def stripJsoncComments = { String raw ->
    if (raw == null || raw.isEmpty()) {
        return ''
    }

    String text = raw.replace('\uFEFF', '')
    StringBuilder out = new StringBuilder(text.length())
    boolean inString = false
    boolean escaped = false
    boolean inLineComment = false
    boolean inBlockComment = false

    for (int i = 0; i < text.length(); i++) {
        char c = text.charAt(i)
        char next = (i + 1 < text.length()) ? text.charAt(i + 1) : '\u0000'

        if (inLineComment) {
            if (c == '\n' || c == '\r') {
                inLineComment = false
                out.append(c)
            }
            continue
        }

        if (inBlockComment) {
            if (c == '*' && next == '/') {
                inBlockComment = false
                i++
            }
            continue
        }

        if (inString) {
            out.append(c)
            if (escaped) {
                escaped = false
            } else if (c == '\\') {
                escaped = true
            } else if (c == '"') {
                inString = false
            }
            continue
        }

        if (c == '"') {
            inString = true
            out.append(c)
            continue
        }

        if (c == '/' && next == '/') {
            inLineComment = true
            i++
            continue
        }

        if (c == '/' && next == '*') {
            inBlockComment = true
            i++
            continue
        }

        out.append(c)
    }

    return out.toString()
}

def stripJsonTrailingCommas = { String raw ->
    if (raw == null || raw.isEmpty()) {
        return ''
    }

    StringBuilder out = new StringBuilder(raw.length())
    boolean inString = false
    boolean escaped = false

    for (int i = 0; i < raw.length(); i++) {
        char c = raw.charAt(i)

        if (inString) {
            out.append(c)
            if (escaped) {
                escaped = false
            } else if (c == '\\') {
                escaped = true
            } else if (c == '"') {
                inString = false
            }
            continue
        }

        if (c == '"') {
            inString = true
            out.append(c)
            continue
        }

        if (c == ',') {
            int j = i + 1
            while (j < raw.length() && Character.isWhitespace(raw.charAt(j))) {
                j++
            }
            if (j < raw.length()) {
                char next = raw.charAt(j)
                if (next == ']' || next == '}') {
                    continue
                }
            }
        }

        out.append(c)
    }

    return out.toString()
}

def readJsonObjectLax = { File source ->
    if (source == null || !source.isFile()) {
        return [:]
    }
    String raw = readText(source)
    if (raw == null || raw.trim().isEmpty()) {
        return [:]
    }

    try {
        String normalized = stripJsonTrailingCommas(stripJsoncComments(raw))
        def parsed = new JsonSlurper().parseText(normalized)
        if (parsed instanceof Map) {
            return new LinkedHashMap<>(parsed as Map)
        }
        throw new GradleException(
                "Expected a top-level JSON object in ${source}, but got ${parsed?.getClass()?.simpleName ?: 'null'}"
        )
    } catch (Throwable t) {
        throw new GradleException(
                "Could not parse VS Code settings file ${source}. " +
                        "Please ensure it contains valid JSON/JSONC.",
                t
        )
    }
}

def mergeJvmArgs = { String existing, List<String> required ->
    String merged = existing?.trim() ?: ''
    required.each { arg ->
        if (!merged.contains(arg)) {
            merged = merged.isEmpty() ? arg : "${merged} ${arg}"
        }
    }
    return merged
}

def ensureAthenaDslVscodeSettings = {
    File settingsFile = file("$rootDir/.vscode/settings.json")
    Map<String, Object> settings = readJsonObjectLax(settingsFile)
    boolean changed = false

    def putIfChanged = { String key, Object value ->
        if (!settings.containsKey(key) || settings[key] != value) {
            settings[key] = value
            changed = true
        }
    }

    putIfChanged('java.configuration.updateBuildConfiguration', 'automatic')
    putIfChanged('java.import.gradle.annotationProcessing.enabled', true)
    putIfChanged('java.jdt.ls.javac.enabled', 'on')
    putIfChanged('java.completion.engine', 'dom')

    String currentVmArgs = settings['java.jdt.ls.vmargs']?.toString() ?: ''
    String mergedVmArgs = mergeJvmArgs(currentVmArgs, athenaDslJdtExports)
    if (currentVmArgs != mergedVmArgs) {
        settings['java.jdt.ls.vmargs'] = mergedVmArgs
        changed = true
    }

    if (changed || !settingsFile.isFile()) {
        settingsFile.parentFile?.mkdirs()
        settingsFile.write(
                JsonOutput.prettyPrint(JsonOutput.toJson(settings)) + System.lineSeparator(),
                'UTF-8'
        )
    }

    return [changed: changed, file: settingsFile]
}

def athenaDslVscodeConfigured = {
    File settingsFile = file("$rootDir/.vscode/settings.json")
    if (!settingsFile.isFile()) {
        return false
    }

    Map<String, Object> settings
    try {
        settings = readJsonObjectLax(settingsFile)
    } catch (Throwable ignored) {
        return false
    }

    String vmArgs = settings['java.jdt.ls.vmargs']?.toString() ?: ''
    boolean hasExports = athenaDslJdtExports.every { vmArgs.contains(it) }
    boolean javacEnabled = 'on'.equalsIgnoreCase(settings['java.jdt.ls.javac.enabled']?.toString())
    boolean domCompletion = 'dom'.equalsIgnoreCase(settings['java.completion.engine']?.toString())
    boolean annotationProcessing = parseBooleanOrDefault(
            settings['java.import.gradle.annotationProcessing.enabled'],
            false
    )

    return javacEnabled && domCompletion && annotationProcessing && hasExports
}

def resolveStaticDeployTaskNames = {
    def allStaticTasks = tasks.matching { task ->
        def lower = task.name.toLowerCase(Locale.ROOT)
        lower.startsWith('deploy') && lower.contains('frcstaticfiledeploy')
    }.collect { it.name }.sort()

    def preferred = allStaticTasks.findAll { taskName ->
        taskName.toLowerCase(Locale.ROOT).startsWith('deployfrcstaticfiledeploy')
    }
    def taskNames = !preferred.isEmpty() ? preferred : allStaticTasks
    if (taskNames.isEmpty()) {
        throw new GradleException(
                "Could not find a GradleRIO static deploy task. " +
                        "Expected something like deployfrcStaticFileDeploy*."
        )
    }
    return taskNames
}

tasks.register('athenaFindRepo') {
    group = 'Athena'
    description = 'Prints the detected local FRC-Athena repository path.'
    doLast {
        def repo = resolveAthenaRepoDir(true)
        logger.lifecycle("Resolved FRC-Athena repo: ${repo}")
    }
}

tasks.register('athenaSync') {
    group = 'Athena'
    description = 'Copies Athena vendordep JSON files from local FRC-Athena into this robot project.'
    doLast {
        def repo = resolveAthenaRepoDir(true)
        syncFromAthenaRepo(repo)
    }
}

tasks.register('athenaBuild') {
    group = 'Athena'
    description = 'Runs Athena build tasks in local FRC-Athena, then syncs vendordep JSON files.'
    doLast {
        def repo = resolveAthenaRepoDir(true)
        Throwable buildFailure = null
        try {
            runAthenaBuild(repo)
        } catch (Throwable t) {
            buildFailure = t
            logger.warn(
                    "Athena build tasks failed; continuing bootstrap sync/plugin publish before failing this task."
            )
        }

        syncFromAthenaRepo(repo)
        String syncedVersion = readAthenaVersionFromRepo(repo)
        ensureAthenaPluginPublished(repo, syncedVersion)

        // If DSL is already enabled in the robot project, keep plugin version aligned
        // with the just-synced Athena vendordep version.
        if (dslConfigured()) {
            File buildFile = resolveRobotBuildFile()
            File settingsFile = resolveSettingsFile()
            boolean includeBuildChanged = ensureAthenaPluginIncludeBuildInSettings(settingsFile, repo)
            upsertAthenaPluginInBuildFile(buildFile, syncedVersion)
            def vscodeResult = ensureAthenaDslVscodeSettings()
            logger.lifecycle("Aligned Athena DSL plugin version in ${buildFile} to ${syncedVersion}")
            if (includeBuildChanged) {
                logger.lifecycle("Updated Athena plugin includeBuild entry in ${settingsFile}")
            }
            if (vscodeResult.changed) {
                logger.lifecycle("Updated VS Code DSL IntelliSense settings in ${vscodeResult.file}")
            }
        } else {
            logger.lifecycle(
                    "Published Athena Gradle plugin ${syncedVersion} to mavenLocal " +
                            "(DSL plugin id not currently configured in build script)."
            )
        }

        if (buildFailure != null) {
            throw new GradleException(
                    "Athena build tasks failed before bootstrap completion. " +
                            "Vendordeps and plugin publish were still attempted; see earlier logs for details.",
                    buildFailure
            )
        }
    }
}

tasks.register('athenaEnableDsl') {
    group = 'Athena'
    description = 'Patches settings/build scripts to enable Athena DSL plugin through plugins { }.'
    doLast {
        File repo = resolveAthenaRepoDir(false)
        String version = resolveAthenaPluginVersion()
        if (repo != null) {
            ensureAthenaPluginPublished(repo, version)
        } else {
            logger.lifecycle(
                    "Local FRC-Athena repo not found; continuing without local plugin publish " +
                            "(expecting plugin ${version} from configured repositories)."
            )
        }
        File buildFile = resolveRobotBuildFile()
        File settingsFile = resolveSettingsFile()
        boolean includeBuildChanged = repo != null
                ? ensureAthenaPluginIncludeBuildInSettings(settingsFile, repo)
                : false
        boolean settingsChanged = ensureAthenaRepoInSettings(settingsFile)
        upsertAthenaPluginInBuildFile(buildFile, version)
        def vscodeResult = ensureAthenaDslVscodeSettings()
        logger.lifecycle("Enabled Athena DSL plugin in ${buildFile} (version ${version})")
        if (settingsChanged) {
            logger.lifecycle("Added Athena plugin repository to ${settingsFile}")
        }
        if (includeBuildChanged) {
            logger.lifecycle("Configured Athena plugin includeBuild in ${settingsFile}")
        }
        if (vscodeResult.changed) {
            logger.lifecycle("Updated VS Code DSL IntelliSense settings in ${vscodeResult.file}")
        }
    }
}

tasks.register('athenaConfigureVscode') {
    group = 'Athena'
    description = 'Applies VS Code settings needed for Athena DSL IntelliSense compatibility.'
    doLast {
        def result = ensureAthenaDslVscodeSettings()
        if (result.changed) {
            logger.lifecycle("Updated VS Code DSL IntelliSense settings in ${result.file}")
        } else {
            logger.lifecycle("VS Code DSL IntelliSense settings already configured in ${result.file}")
        }
    }
}

tasks.register('athenaDisableDsl') {
    group = 'Athena'
    description = 'Removes Athena plugin id line from build.gradle(.kts).'
    doLast {
        File buildFile = resolveRobotBuildFile()
        boolean removed = removeAthenaPluginFromBuildFile(buildFile)
        if (removed) {
            logger.lifecycle("Removed Athena DSL plugin id line from ${buildFile}")
        } else {
            logger.lifecycle("No Athena DSL plugin id line found in ${buildFile}")
        }
    }
}

tasks.register('athenaUpload') {
    group = 'Athena'
    description = 'Uploads only src/main/deploy files to the roboRIO (no robot code deploy).'
    dependsOn {
        resolveStaticDeployTaskNames()
    }
    doFirst {
        def taskNames = resolveStaticDeployTaskNames()
        logger.lifecycle("athenaUpload -> ${taskNames.join(', ')}")
    }
}

tasks.register('athenaDoctor') {
    group = 'Athena'
    description = 'Prints Athena bootstrap health checks for this robot project.'
    doLast {
        def coreVendordep = file("$rootDir/vendordeps/${athenaBootstrapConfig.athenaCoreVendordep}")
        def vendordepVersion = readAthenaVersionFromVendordep(coreVendordep)
        logger.lifecycle("Athena core vendordep present: ${coreVendordep.isFile()}")
        if (vendordepVersion != null) {
            logger.lifecycle("Athena core vendordep version: ${vendordepVersion}")
        }

        def repo = resolveAthenaRepoDir(false)
        logger.lifecycle("Local FRC-Athena repo detected: ${repo != null ? repo : '<none>'}")
        if (repo != null) {
            logger.lifecycle("Local FRC-Athena version: ${readAthenaVersionFromRepo(repo)}")
        }

        logger.lifecycle("Athena DSL plugin configured in build file: ${dslConfigured()}")
        logger.lifecycle("Athena VS Code DSL settings configured: ${athenaDslVscodeConfigured()}")
        logger.lifecycle(
                "Athena DSL requested by property now: ${athenaDslRequested} " +
                        "(requires athenaEnableDsl + rerun)"
        )
        def staticTasks = resolveStaticDeployTaskNames()
        logger.lifecycle("Resolved static deploy task(s): ${staticTasks.join(', ')}")
    }
}
