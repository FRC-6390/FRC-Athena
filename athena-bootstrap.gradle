def stripJsoncComments = { String raw ->
    if (raw == null || raw.isEmpty()) {
        return ''
    }

    String text = raw.replace('\uFEFF', '')
    StringBuilder out = new StringBuilder(text.length())
    boolean inString = false
    boolean escaped = false
    boolean inLineComment = false
    boolean inBlockComment = false

    for (int i = 0; i < text.length(); i++) {
        char c = text.charAt(i)
        char next = (i + 1 < text.length()) ? text.charAt(i + 1) : '\u0000'

        if (inLineComment) {
            if (c == '\n' || c == '\r') {
                inLineComment = false
                out.append(c)
            }
            continue
        }

        if (inBlockComment) {
            if (c == '*' && next == '/') {
                inBlockComment = false
                i++
            }
            continue
        }

        if (inString) {
            out.append(c)
            if (escaped) {
                escaped = false
            } else if (c == '\\') {
                escaped = true
            } else if (c == '"') {
                inString = false
            }
            continue
        }

        if (c == '"') {
            inString = true
            out.append(c)
            continue
        }

        if (c == '/' && next == '/') {
            inLineComment = true
            i++
            continue
        }

        if (c == '/' && next == '*') {
            inBlockComment = true
            i++
            continue
        }

        out.append(c)
    }

    return out.toString()
}

def stripJsonTrailingCommas = { String raw ->
    if (raw == null || raw.isEmpty()) {
        return ''
    }

    StringBuilder out = new StringBuilder(raw.length())
    boolean inString = false
    boolean escaped = false

    for (int i = 0; i < raw.length(); i++) {
        char c = raw.charAt(i)

        if (inString) {
            out.append(c)
            if (escaped) {
                escaped = false
            } else if (c == '\\') {
                escaped = true
            } else if (c == '"') {
                inString = false
            }
            continue
        }

        if (c == '"') {
            inString = true
            out.append(c)
            continue
        }

        if (c == ',') {
            int j = i + 1
            while (j < raw.length() && Character.isWhitespace(raw.charAt(j))) {
                j++
            }
            if (j < raw.length()) {
                char next = raw.charAt(j)
                if (next == ']' || next == '}') {
                    continue
                }
            }
        }

        out.append(c)
    }

    return out.toString()
}

def readJsonObjectLax = { File source ->
    if (source == null || !source.isFile()) {
        return [:]
    }
    String raw = readText(source)
    if (raw == null || raw.trim().isEmpty()) {
        return [:]
    }

    try {
        String normalized = stripJsonTrailingCommas(stripJsoncComments(raw))
        def parsed = new JsonSlurper().parseText(normalized)
        if (parsed instanceof Map) {
            return new LinkedHashMap<>(parsed as Map)
        }
        throw new GradleException(
                "Expected a top-level JSON object in ${source}, but got ${parsed?.getClass()?.simpleName ?: 'null'}"
        )
    } catch (Throwable t) {
        throw new GradleException(
                "Could not parse VS Code settings file ${source}. " +
                        "Please ensure it contains valid JSON/JSONC.",
                t
        )
    }
}

def normalizeJavaHome = { Object raw ->
    if (raw == null) {
        return null
    }

    File candidate = raw instanceof File ? raw : file(raw.toString())
    File normalized = canonicalOrSelf(candidate)
    if (normalized == null || !normalized.exists()) {
        return null
    }

    if (normalized.name.equalsIgnoreCase('jre') && normalized.parentFile != null) {
        normalized = canonicalOrSelf(normalized.parentFile)
    }

    String javaBinaryName = System.getProperty('os.name')
            .toLowerCase(Locale.ROOT)
            .contains('win') ? 'java.exe' : 'java'
    File javaBinary = new File(new File(normalized, 'bin'), javaBinaryName)
    return javaBinary.isFile() ? normalized : null
}

def parseJavaMajorVersion = { Object raw ->
    if (raw == null) {
        return null
    }

    String version = raw.toString().replace('"', '').trim()
    if (version.isEmpty()) {
        return null
    }
    if (version.startsWith('1.')) {
        version = version.substring(2)
    }

    int end = 0
    while (end < version.length() && Character.isDigit(version.charAt(end))) {
        end++
    }
    if (end == 0) {
        return null
    }

    try {
        return Integer.parseInt(version.substring(0, end))
    } catch (NumberFormatException ignored) {
        return null
    }
}

def readJavaVersionFromHome = { Object raw ->
    File javaHome = normalizeJavaHome(raw)
    if (javaHome == null) {
        return null
    }

    File releaseFile = new File(javaHome, 'release')
    if (!releaseFile.isFile()) {
        return null
    }

    try {
        String line = releaseFile.readLines('UTF-8').find { it.startsWith('JAVA_VERSION=') }
        if (line == null) {
            return null
        }
        return line.substring('JAVA_VERSION='.length()).trim().replace('"', '')
    } catch (IOException ignored) {
        return null
    }
}

def readJavaMajorVersionFromHome = { Object raw ->
    return parseJavaMajorVersion(readJavaVersionFromHome(raw))
}

def collectAthenaJavaHomeCandidates = { Map<String, Object> settings = [:] ->
    def candidates = [] as List<File>
    def addCandidate = { Object raw ->
        File javaHome = normalizeJavaHome(raw)
        if (javaHome == null) {
            return
        }
        if (!candidates.any { it.absolutePath == javaHome.absolutePath }) {
            candidates << javaHome
        }
    }
    def addDirectoryChildren = { File dir, Closure<File> mapper = { child -> child } ->
        if (dir == null || !dir.isDirectory()) {
            return
        }
        dir.listFiles()
                ?.findAll { it.isDirectory() }
                ?.sort { it.name }
                ?.each { child -> addCandidate(mapper(child)) }
    }

    addCandidate(settings['java.jdt.ls.java.home'])
    addCandidate(settings['java.import.gradle.java.home'])
    addCandidate(project.findProperty('org.gradle.java.home')?.toString()?.trim())
    addCandidate(System.getenv('JAVA_HOME'))
    addCandidate(System.getProperty('java.home'))

    def userHomePath = System.getProperty('user.home')
    if (userHomePath != null && !userHomePath.toString().trim().isEmpty()) {
        File userHome = new File(userHomePath.toString().trim())
        addCandidate(new File(userHome, 'wpilib/2026/jdk'))
        addCandidate(new File(userHome, 'wpilib/current/jdk'))
        addDirectoryChildren(new File(userHome, '.sdkman/candidates/java'))
        addDirectoryChildren(new File(userHome, '.jdks'))
        addDirectoryChildren(new File(userHome, '.gradle/jdks'))
    }

    addDirectoryChildren(new File('/usr/lib/jvm'))
    addDirectoryChildren(new File('/Library/Java/JavaVirtualMachines')) { File child ->
        new File(child, 'Contents/Home')
    }
    addDirectoryChildren(new File('C:/Program Files/Java'))
    addDirectoryChildren(new File('C:/Program Files/Eclipse Adoptium'))
    addDirectoryChildren(new File('C:/Program Files/Microsoft'))
    addDirectoryChildren(new File('C:/Program Files/Amazon Corretto'))
    addCandidate(new File('C:/Users/Public/wpilib/2026/jdk'))
    addCandidate(new File('C:/Users/Public/wpilib/current/jdk'))

    return candidates
}

def resolveAthenaDslLanguageServerJavaHome = { Map<String, Object> settings = [:] ->
    def candidates = [] as List<File>
    def addCandidate = { Object raw ->
        File javaHome = normalizeJavaHome(raw)
        if (javaHome == null) {
            return
        }
        if (!candidates.any { it.absolutePath == javaHome.absolutePath }) {
            candidates << javaHome
        }
    }

    addCandidate(project.findProperty(athenaBootstrapConfig.vscodeJdtJavaHomeProperty)?.toString()?.trim())
    addCandidate(System.getenv(athenaBootstrapConfig.vscodeJdtJavaHomeEnv))
    addCandidate(settings['java.jdt.ls.java.home'])
    collectAthenaJavaHomeCandidates(settings).each { addCandidate(it) }

    return candidates.find { File javaHome ->
        Integer major = readJavaMajorVersionFromHome(javaHome)
        return major != null && major >= 24
    }
}

def resolveAthenaDslGradleJavaHome = { Map<String, Object> settings = [:] ->
    def candidates = [] as List<File>
    def addCandidate = { Object raw ->
        File javaHome = normalizeJavaHome(raw)
        if (javaHome == null) {
            return
        }
        if (!candidates.any { it.absolutePath == javaHome.absolutePath }) {
            candidates << javaHome
        }
    }

    addCandidate(project.findProperty(athenaBootstrapConfig.vscodeGradleJavaHomeProperty)?.toString()?.trim())
    addCandidate(System.getenv(athenaBootstrapConfig.vscodeGradleJavaHomeEnv))
    addCandidate(settings['java.import.gradle.java.home'])
    addCandidate(project.findProperty('org.gradle.java.home')?.toString()?.trim())
    addCandidate(System.getenv('JAVA_HOME'))
    addCandidate(System.getProperty('java.home'))
    collectAthenaJavaHomeCandidates(settings).each { addCandidate(it) }

    return candidates.find { File javaHome ->
        Integer major = readJavaMajorVersionFromHome(javaHome)
        return major != null && major >= 17
    }
}

def mergeJvmArgs = { String existing, List<String> required ->
    String merged = existing?.trim() ?: ''
    required.each { arg ->
        if (!merged.contains(arg)) {
            merged = merged.isEmpty() ? arg : "${merged} ${arg}"
        }
    }
    return merged
}

def ensureAthenaDslVscodeSettings = {
    File settingsFile = file("$rootDir/.vscode/settings.json")
    Map<String, Object> settings = readJsonObjectLax(settingsFile)
    boolean changed = false

    def putIfChanged = { String key, Object value ->
        if (!settings.containsKey(key) || settings[key] != value) {
            settings[key] = value
            changed = true
        }
    }

    putIfChanged('java.configuration.updateBuildConfiguration', 'automatic')
    // Athena's enum DSL is a javac plugin, not an annotation processor. Leaving
    // IDE-side annotation processing enabled currently trips a Red Hat/Microsoft
    // Java builder ClassCastException and causes false DSL diagnostics.
    putIfChanged('java.import.gradle.annotationProcessing.enabled', false)
    putIfChanged('java.jdt.ls.javac.enabled', 'on')
    putIfChanged('java.completion.engine', 'dom')
    putIfChanged('editor.quickSuggestions', true)
    putIfChanged('editor.suggestOnTriggerCharacters', true)

    File languageServerJavaHome = resolveAthenaDslLanguageServerJavaHome(settings)
    if (languageServerJavaHome != null) {
        putIfChanged('java.jdt.ls.java.home', languageServerJavaHome.absolutePath)
    }

    File gradleJavaHome = resolveAthenaDslGradleJavaHome(settings)
    if (gradleJavaHome != null) {
        putIfChanged('java.import.gradle.java.home', gradleJavaHome.absolutePath)
    }

    String currentVmArgs = settings['java.jdt.ls.vmargs']?.toString() ?: ''
    String mergedVmArgs = mergeJvmArgs(currentVmArgs, athenaDslJdtExports)
    if (currentVmArgs != mergedVmArgs) {
        settings['java.jdt.ls.vmargs'] = mergedVmArgs
        changed = true
    }

    if (changed || !settingsFile.isFile()) {
        settingsFile.parentFile?.mkdirs()
        settingsFile.write(
                JsonOutput.prettyPrint(JsonOutput.toJson(settings)) + System.lineSeparator(),
                'UTF-8'
        )
    }

    return [changed: changed, file: settingsFile]
}

def upsertEclipsePrefsProperty = { File prefsFile, String key, String value ->
    if (prefsFile == null) {
        return false
    }

    String original = prefsFile.isFile() ? readText(prefsFile) : ''
    String updated = original
    String keyPattern = java.util.regex.Pattern.quote(key)
    String replacement = java.util.regex.Matcher.quoteReplacement("${key}=${value}")

    if (updated =~ /(?m)^${keyPattern}=/) {
        updated = updated.replaceFirst(/(?m)^${keyPattern}=.*$/, replacement)
    } else {
        if (!updated.contains('eclipse.preferences.version=')) {
            updated = "eclipse.preferences.version=1" + System.lineSeparator() + updated
        }
        if (!updated.isEmpty() && !(updated.endsWith('\n') || updated.endsWith('\r'))) {
            updated += System.lineSeparator()
        }
        updated += "${key}=${value}" + System.lineSeparator()
    }

    if (updated == original) {
        return false
    }

    prefsFile.parentFile?.mkdirs()
    prefsFile.write(updated, 'UTF-8')
    return true
}

def ensureAthenaDslEclipsePrefs = {
    File settingsDir = file("$rootDir/.settings")
    boolean changed = false
    changed |= upsertEclipsePrefsProperty(
            new File(settingsDir, 'org.eclipse.jdt.apt.core.prefs'),
            'org.eclipse.jdt.apt.aptEnabled',
            'false'
    )
    changed |= upsertEclipsePrefsProperty(
            new File(settingsDir, 'org.eclipse.jdt.core.prefs'),
            'org.eclipse.jdt.core.compiler.processAnnotations',
            'disabled'
    )
    return [changed: changed, dir: settingsDir]
}

def upsertNamedJsonEntry = { List<Object> entries, String key, String value, Map<String, Object> desired ->
    int index = entries.findIndexOf { Object entry ->
        entry instanceof Map && entry[key]?.toString() == value
    }
    if (index >= 0) {
        if (entries[index] != desired) {
            entries[index] = desired
            return true
        }
        return false
    }

    entries.add(desired)
    return true
}

def ensureAthenaDesktopDebugVscodeFiles = {
    File launchFile = file("$rootDir/.vscode/launch.json")
    File tasksFile = file("$rootDir/.vscode/tasks.json")

    if (!project.plugins.hasPlugin('edu.wpi.first.GradleRIO')) {
        return [
                supported   : false,
                launchChanged: false,
                tasksChanged : false,
                launchFile   : launchFile,
                tasksFile    : tasksFile
        ]
    }

    String osName = System.getProperty('os.name').toLowerCase(Locale.ROOT)
    String gradlewCommand = osName.contains('win') ? 'gradlew.bat' : './gradlew'
    String halSimGuiLib = osName.contains('win')
            ? 'halsim_guid.dll'
            : osName.contains('mac') ? 'libhalsim_guid.dylib' : 'libhalsim_guid.so'

    Map<String, Object> desiredTask = new LinkedHashMap<>()
    desiredTask['label'] = 'Athena Desktop Debug Prep'
    desiredTask['type'] = 'shell'
    desiredTask['command'] = gradlewCommand
    desiredTask['args'] = ['jar', 'extractDebugNative', '--console=plain']
    desiredTask['options'] = [cwd: '${workspaceFolder}']
    desiredTask['problemMatcher'] = []

    Map<String, Object> desiredLaunch = new LinkedHashMap<>()
    desiredLaunch['type'] = 'java'
    desiredLaunch['name'] = 'WPILib Desktop Debug'
    desiredLaunch['request'] = 'launch'
    desiredLaunch['mainClass'] = 'frc.robot.Main'
    desiredLaunch['cwd'] = '${workspaceFolder}'
    desiredLaunch['classPaths'] = ['${workspaceFolder}/build/libs/${workspaceFolderBasename}.jar']
    desiredLaunch['vmArgs'] = '-Djava.library.path=${workspaceFolder}/build/jni/debug'
    desiredLaunch['env'] = [
            HALSIM_EXTENSIONS : '${workspaceFolder}/build/jni/debug/' + halSimGuiLib,
            DYLD_LIBRARY_PATH : '${workspaceFolder}/build/jni/debug',
            LD_LIBRARY_PATH   : '${workspaceFolder}/build/jni/debug'
    ]
    desiredLaunch['preLaunchTask'] = 'Athena Desktop Debug Prep'
    desiredLaunch['console'] = 'integratedTerminal'

    Map<String, Object> launch = readJsonObjectLax(launchFile)
    boolean launchChanged = false
    if (launch['version'] != '0.2.0') {
        launch['version'] = '0.2.0'
        launchChanged = true
    }
    List<Object> configurations = launch['configurations'] instanceof List
            ? new ArrayList<>(launch['configurations'] as List)
            : new ArrayList<>()
    if (upsertNamedJsonEntry(configurations, 'name', desiredLaunch['name'].toString(), desiredLaunch)) {
        launchChanged = true
    }
    launch['configurations'] = configurations
    if (launchChanged || !launchFile.isFile()) {
        launchFile.parentFile?.mkdirs()
        launchFile.write(
                JsonOutput.prettyPrint(JsonOutput.toJson(launch)) + System.lineSeparator(),
                'UTF-8'
        )
    }

    Map<String, Object> tasks = readJsonObjectLax(tasksFile)
    boolean tasksChanged = false
    if (tasks['version'] != '2.0.0') {
        tasks['version'] = '2.0.0'
        tasksChanged = true
    }
    List<Object> taskEntries = tasks['tasks'] instanceof List
            ? new ArrayList<>(tasks['tasks'] as List)
            : new ArrayList<>()
    if (upsertNamedJsonEntry(taskEntries, 'label', desiredTask['label'].toString(), desiredTask)) {
        tasksChanged = true
    }
    tasks['tasks'] = taskEntries
    if (tasksChanged || !tasksFile.isFile()) {
        tasksFile.parentFile?.mkdirs()
        tasksFile.write(
                JsonOutput.prettyPrint(JsonOutput.toJson(tasks)) + System.lineSeparator(),
                'UTF-8'
        )
    }

    return [
            supported   : true,
            launchChanged: launchChanged,
            tasksChanged : tasksChanged,
            launchFile   : launchFile,
            tasksFile    : tasksFile
    ]
}

def athenaDslVscodeStatus = {
    File settingsFile = file("$rootDir/.vscode/settings.json")
    if (!settingsFile.isFile()) {
        return [
                configured            : false,
                file                  : settingsFile,
                jdtJavaHome           : null,
                jdtJavaMajor          : null,
                gradleJavaHome        : null,
                gradleJavaMajor       : null
        ]
    }

    Map<String, Object> settings
    try {
        settings = readJsonObjectLax(settingsFile)
    } catch (Throwable ignored) {
        return [
                configured            : false,
                file                  : settingsFile,
                jdtJavaHome           : null,
                jdtJavaMajor          : null,
                gradleJavaHome        : null,
                gradleJavaMajor       : null
        ]
    }

    String vmArgs = settings['java.jdt.ls.vmargs']?.toString() ?: ''
    boolean hasExports = athenaDslJdtExports.every { vmArgs.contains(it) }
    boolean javacEnabled = 'on'.equalsIgnoreCase(settings['java.jdt.ls.javac.enabled']?.toString())
    boolean domCompletion = 'dom'.equalsIgnoreCase(settings['java.completion.engine']?.toString())
    boolean annotationProcessing = parseBooleanOrDefault(
            settings['java.import.gradle.annotationProcessing.enabled'],
            false
    )
    File languageServerJavaHome = normalizeJavaHome(settings['java.jdt.ls.java.home'])
    Integer languageServerJavaMajor = readJavaMajorVersionFromHome(languageServerJavaHome)
    File gradleJavaHome = normalizeJavaHome(settings['java.import.gradle.java.home'])
    Integer gradleJavaMajor = readJavaMajorVersionFromHome(gradleJavaHome)

    return [
            configured     : javacEnabled
                    && domCompletion
                    && hasExports
                    && languageServerJavaMajor != null
                    && languageServerJavaMajor >= 24
                    && gradleJavaMajor != null
                    && gradleJavaMajor >= 17,
            file           : settingsFile,
            annotationProcessingEnabled: annotationProcessing,
            jdtJavaHome    : languageServerJavaHome,
            jdtJavaMajor   : languageServerJavaMajor,
            gradleJavaHome : gradleJavaHome,
            gradleJavaMajor: gradleJavaMajor
    ]
}

def athenaDslVscodeConfigured = {
    return athenaDslVscodeStatus().configured
}

def resolveStaticDeployTaskNames = {
    def allStaticTasks = tasks.matching { task ->
        def lower = task.name.toLowerCase(Locale.ROOT)
        lower.startsWith('deploy') && lower.contains('frcstaticfiledeploy')
    }.collect { it.name }.sort()

    def preferred = allStaticTasks.findAll { taskName ->
        taskName.toLowerCase(Locale.ROOT).startsWith('deployfrcstaticfiledeploy')
    }
    def taskNames = !preferred.isEmpty() ? preferred : allStaticTasks
    if (taskNames.isEmpty()) {
        throw new GradleException(
                "Could not find a GradleRIO static deploy task. " +
                        "Expected something like deployfrcStaticFileDeploy*."
        )
    }
    return taskNames
}

tasks.register('athenaFindRepo') {
    group = 'Athena'
    description = 'Prints the detected local FRC-Athena repository path.'
    doLast {
        def repo = resolveAthenaRepoDir(true)
        logger.lifecycle("Resolved FRC-Athena repo: ${repo}")
    }
}

tasks.register('athenaSync') {
    group = 'Athena'
    description = 'Copies Athena vendordep JSON files from local FRC-Athena into this robot project.'
    doLast {
        def repo = resolveAthenaRepoDir(true)
        syncFromAthenaRepo(repo)
    }
}

tasks.register('athenaBuild') {
    group = 'Athena'
    description = 'Runs Athena build tasks in local FRC-Athena, then syncs vendordep JSON files.'
    doLast {
        def repo = resolveAthenaRepoDir(true)
        Throwable buildFailure = null
        try {
            runAthenaBuild(repo)
        } catch (Throwable t) {
            buildFailure = t
            logger.warn(
                    "Athena build tasks failed; continuing bootstrap sync/plugin publish before failing this task."
            )
        }

        syncFromAthenaRepo(repo)
        String syncedVersion = readAthenaVersionFromRepo(repo)
        ensureAthenaPluginPublished(repo, syncedVersion)

        // If DSL is already enabled in the robot project, keep plugin version aligned
        // with the just-synced Athena vendordep version.
        if (dslConfigured()) {
            File buildFile = resolveRobotBuildFile()
            File settingsFile = resolveSettingsFile()
            boolean includeBuildChanged = ensureAthenaPluginIncludeBuildInSettings(settingsFile, repo)
            upsertAthenaPluginInBuildFile(buildFile, syncedVersion)
            def vscodeResult = ensureAthenaDslVscodeSettings()
            logger.lifecycle("Aligned Athena DSL plugin version in ${buildFile} to ${syncedVersion}")
            if (includeBuildChanged) {
                logger.lifecycle("Updated Athena plugin includeBuild entry in ${settingsFile}")
            }
            if (vscodeResult.changed) {
                logger.lifecycle("Updated VS Code DSL IntelliSense settings in ${vscodeResult.file}")
            }
        } else {
            logger.lifecycle(
                    "Published Athena Gradle plugin ${syncedVersion} to mavenLocal " +
                            "(DSL plugin id not currently configured in build script)."
            )
        }

        if (buildFailure != null) {
            throw new GradleException(
                    "Athena build tasks failed before bootstrap completion. " +
                            "Vendordeps and plugin publish were still attempted; see earlier logs for details.",
                    buildFailure
            )
        }
    }
}

tasks.register('athenaEnableDsl') {
    group = 'Athena'
    description = 'Patches settings/build scripts to enable Athena DSL plugin through plugins { }.'
    doLast {
        File repo = resolveAthenaRepoDir(false)
        String version = resolveAthenaPluginVersion()
        if (repo != null) {
            ensureAthenaPluginPublished(repo, version)
        } else {
            logger.lifecycle(
                    "Local FRC-Athena repo not found; continuing without local plugin publish " +
                            "(expecting plugin ${version} from configured repositories)."
            )
        }
        File buildFile = resolveRobotBuildFile()
        File settingsFile = resolveSettingsFile()
        boolean includeBuildChanged = repo != null
                ? ensureAthenaPluginIncludeBuildInSettings(settingsFile, repo)
                : false
        boolean settingsChanged = ensureAthenaRepoInSettings(settingsFile)
        upsertAthenaPluginInBuildFile(buildFile, version)
        def vscodeResult = ensureAthenaDslVscodeSettings()
        def eclipsePrefsResult = ensureAthenaDslEclipsePrefs()
        def debugResult = ensureAthenaDesktopDebugVscodeFiles()
        logger.lifecycle("Enabled Athena DSL plugin in ${buildFile} (version ${version})")
        if (settingsChanged) {
            logger.lifecycle("Added Athena plugin repository to ${settingsFile}")
        }
        if (includeBuildChanged) {
            logger.lifecycle("Removed stale Athena plugin includeBuild overrides from ${settingsFile}")
        }
        if (vscodeResult.changed) {
            logger.lifecycle("Updated VS Code DSL IntelliSense settings in ${vscodeResult.file}")
        }
        if (eclipsePrefsResult.changed) {
            logger.lifecycle("Updated Eclipse/JDT annotation-processing prefs in ${eclipsePrefsResult.dir}")
        }
        if (debugResult.supported && (debugResult.launchChanged || debugResult.tasksChanged)) {
            logger.lifecycle("Updated VS Code desktop debug launch/task files in ${debugResult.launchFile.parentFile}")
        }
    }
}

tasks.register('athenaConfigureVscode') {
    group = 'Athena'
    description = 'Applies VS Code settings and desktop debug launch files needed for Athena projects.'
    doLast {
        def result = ensureAthenaDslVscodeSettings()
        def eclipsePrefsResult = ensureAthenaDslEclipsePrefs()
        def debugResult = ensureAthenaDesktopDebugVscodeFiles()
        if (result.changed) {
            logger.lifecycle("Updated VS Code DSL IntelliSense settings in ${result.file}")
        } else {
            logger.lifecycle("VS Code DSL IntelliSense settings already configured in ${result.file}")
        }
        if (eclipsePrefsResult.changed) {
            logger.lifecycle("Updated Eclipse/JDT annotation-processing prefs in ${eclipsePrefsResult.dir}")
        }
        if (debugResult.supported) {
            if (debugResult.launchChanged || debugResult.tasksChanged) {
                logger.lifecycle("Updated VS Code desktop debug launch/task files in ${debugResult.launchFile.parentFile}")
            } else {
                logger.lifecycle("VS Code desktop debug launch/task files already configured in ${debugResult.launchFile.parentFile}")
            }
        }
    }
}

def eclipseTask = tasks.findByName('eclipse')
if (eclipseTask != null) {
    ['athenaSync', 'athenaBuild', 'athenaEnableDsl', 'athenaConfigureVscode'].each { athenaTaskName ->
        tasks.named(athenaTaskName) {
            finalizedBy(eclipseTask)
        }
    }
}

tasks.register('athenaDisableDsl') {
    group = 'Athena'
    description = 'Removes Athena plugin id line from build.gradle(.kts).'
    doLast {
        File buildFile = resolveRobotBuildFile()
        boolean removed = removeAthenaPluginFromBuildFile(buildFile)
        if (removed) {
            logger.lifecycle("Removed Athena DSL plugin id line from ${buildFile}")
        } else {
            logger.lifecycle("No Athena DSL plugin id line found in ${buildFile}")
        }
    }
}

tasks.register('athenaUpload') {
    group = 'Athena'
    description = 'Uploads only src/main/deploy files to the roboRIO (no robot code deploy).'
    dependsOn {
        resolveStaticDeployTaskNames()
    }
    doFirst {
        def taskNames = resolveStaticDeployTaskNames()
        logger.lifecycle("athenaUpload -> ${taskNames.join(', ')}")
    }
}

tasks.register('athenaDoctor') {
    group = 'Athena'
    description = 'Prints Athena bootstrap health checks for this robot project.'
    doLast {
        def coreVendordep = file("$rootDir/vendordeps/${athenaBootstrapConfig.athenaCoreVendordep}")
        def vendordepVersion = readAthenaVersionFromVendordep(coreVendordep)
        logger.lifecycle("Athena core vendordep present: ${coreVendordep.isFile()}")
        if (vendordepVersion != null) {
            logger.lifecycle("Athena core vendordep version: ${vendordepVersion}")
        }

        def repo = resolveAthenaRepoDir(false)
        logger.lifecycle("Local FRC-Athena repo detected: ${repo != null ? repo : '<none>'}")
        if (repo != null) {
            logger.lifecycle("Local FRC-Athena version: ${readAthenaVersionFromRepo(repo)}")
        }

        logger.lifecycle("Athena DSL plugin configured in build file: ${dslConfigured()}")
        def vscodeStatus = athenaDslVscodeStatus()
        logger.lifecycle("Athena VS Code DSL settings configured: ${vscodeStatus.configured}")
        logger.lifecycle("Athena VS Code Gradle annotation processing enabled: ${vscodeStatus.annotationProcessingEnabled}")
        logger.lifecycle(
                "Athena VS Code language server JDK: ${vscodeStatus.jdtJavaHome ?: '<missing>'}" +
                        (vscodeStatus.jdtJavaMajor != null ? " (Java ${vscodeStatus.jdtJavaMajor})" : '')
        )
        logger.lifecycle(
                "Athena VS Code Gradle JDK: ${vscodeStatus.gradleJavaHome ?: '<missing>'}" +
                        (vscodeStatus.gradleJavaMajor != null ? " (Java ${vscodeStatus.gradleJavaMajor})" : '')
        )
        def eclipsePluginStatus = athenaEclipsePluginClasspathStatus()
        logger.lifecycle(
                "Athena Eclipse classpath plugin jar: " +
                        (eclipsePluginStatus.present ? eclipsePluginStatus.classpathJar : '<missing>')
        )
        if (eclipsePluginStatus.present) {
            logger.lifecycle(
                    "Athena Eclipse classpath plugin jar matches mavenLocal: " +
                            "${eclipsePluginStatus.matchesMavenLocal}"
            )
        }
        logger.lifecycle(
                "Athena DSL requested by property now: ${athenaDslRequested} " +
                        "(requires athenaEnableDsl + rerun)"
        )
        def staticTasks = resolveStaticDeployTaskNames()
        logger.lifecycle("Resolved static deploy task(s): ${staticTasks.join(', ')}")
    }
}
