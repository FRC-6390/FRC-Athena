def resolveRobotBuildFile = {
    def groovyBuild = file("$rootDir/build.gradle")
    if (groovyBuild.isFile()) {
        return groovyBuild
    }
    def ktsBuild = file("$rootDir/build.gradle.kts")
    if (ktsBuild.isFile()) {
        return ktsBuild
    }
    throw new GradleException("Could not find build.gradle or build.gradle.kts at ${rootDir}")
}

def readText = { File source ->
    source.isFile() ? source.getText('UTF-8') : ''
}

def resolveSettingsFile = {
    def groovySettings = file("$rootDir/settings.gradle")
    if (groovySettings.isFile()) {
        return groovySettings
    }
    def ktsSettings = file("$rootDir/settings.gradle.kts")
    if (ktsSettings.isFile()) {
        return ktsSettings
    }
    throw new GradleException("Could not find settings.gradle or settings.gradle.kts at ${rootDir}")
}

def upsertAthenaPluginInBuildFile = { File buildFile, String version ->
    boolean kts = buildFile.name.toLowerCase(Locale.ROOT).endsWith('.kts')
    String athenaLine = kts
            ? "    id(\"ca.frc6390.athena.plugin\") version \"${version}\""
            : "    id \"ca.frc6390.athena.plugin\" version \"${version}\""
    String original = readText(buildFile)

    def existingPattern = kts
            ? ~/(?m)^\s*id\(\s*"ca\.frc6390\.athena\.plugin"\s*\)\s*(version\s*"[^"]+")?\s*$/
            : ~/(?m)^\s*id\s*["']ca\.frc6390\.athena\.plugin["']\s*(version\s*["'][^"']+["'])?\s*$/
    if ((original =~ existingPattern).find()) {
        String updated = original.replaceFirst(existingPattern, athenaLine)
        buildFile.write(updated, 'UTF-8')
        return
    }

    def pluginsBlockPattern = ~/(?s)(plugins\s*\{)(.*?)(\})/
    def matcher = pluginsBlockPattern.matcher(original)
    if (!matcher.find()) {
        throw new GradleException(
                "Could not find plugins { } block in ${buildFile}. " +
                        "Add Athena plugin manually: ${athenaLine.trim()}"
        )
    }
    String replacement = matcher.group(1) + matcher.group(2) + "\n" + athenaLine + "\n" + matcher.group(3)
    String updated = original.substring(0, matcher.start()) + replacement + original.substring(matcher.end())
    buildFile.write(updated, 'UTF-8')
}

def removeAthenaPluginFromBuildFile = { File buildFile ->
    boolean kts = buildFile.name.toLowerCase(Locale.ROOT).endsWith('.kts')
    String original = readText(buildFile)
    def linePattern = kts
            ? ~/(?m)^\s*id\(\s*"ca\.frc6390\.athena\.plugin"\s*\)\s*(version\s*"[^"]+")?\s*\n?/
            : ~/(?m)^\s*id\s*["']ca\.frc6390\.athena\.plugin["']\s*(version\s*["'][^"']+["'])?\s*\n?/
    String updated = original.replaceFirst(linePattern, '')
    if (updated != original) {
        buildFile.write(updated, 'UTF-8')
        return true
    }
    return false
}

def ensureAthenaRepoInSettings = { File settingsFile ->
    String original = readText(settingsFile)
    if (original.contains(athenaBootstrapConfig.athenaMavenUrl)) {
        return false
    }

    boolean kts = settingsFile.name.toLowerCase(Locale.ROOT).endsWith('.kts')
    String bootstrapBlock = kts
            ? "        maven(url = \"${athenaBootstrapConfig.athenaMavenUrl}\")"
            : "        maven { url '${athenaBootstrapConfig.athenaMavenUrl}' }"
    String updated = original

    if (original.contains('gradlePluginPortal()')) {
        updated = original.replaceFirst(
                /gradlePluginPortal\(\)/,
                "gradlePluginPortal()\n${bootstrapBlock}"
        )
    } else if (original.contains('mavenLocal()')) {
        updated = original.replaceFirst(
                /mavenLocal\(\)/,
                "mavenLocal()\n${bootstrapBlock}"
        )
    } else {
        throw new GradleException(
                "Could not inject Athena plugin repo into ${settingsFile}. " +
                        "Please add repository manually: ${athenaBootstrapConfig.athenaMavenUrl}"
        )
    }

    settingsFile.write(updated, 'UTF-8')
    return true
}

def ensureAthenaPluginIncludeBuildInSettings = { File settingsFile, File athenaRepo ->
    if (settingsFile == null || !settingsFile.isFile()) {
        return false
    }

    String original = readText(settingsFile)

    String updated = original
    // Remove old generated optional block; local includeBuild plugin resolution has
    // proven unstable under VS Code/Buildship and can hand JDT a partial plugin jar.
    updated = updated.replaceAll(
            /(?ms)^\s*\/\/ Athena optional local plugin override \(generated by athenaBootstrap\).*?^\s*\/\/ Athena optional local plugin override end\s*\r?\n?/,
            ''
    )
    // Remove hardcoded athena-plugin includeBuild lines to avoid machine-specific paths
    // and keep IDE resolution on the published plugin artifact.
    updated = updated.replaceAll(
            /(?m)^\s*includeBuild\(\s*["'][^"']*athena-plugin[^"']*["']\s*\)\s*\r?\n?/,
            ''
    )
    if (updated == original) {
        return false
    }
    settingsFile.write(updated, 'UTF-8')
    return true
}

