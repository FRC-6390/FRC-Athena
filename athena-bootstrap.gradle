def athenaMergeServicesEnabled = parseBooleanOrDefault(
        project.findProperty(athenaBootstrapConfig.mergeServicesProperty),
        true
)

def configureAthenaServiceMerge = {
    if (!athenaMergeServicesEnabled) {
        logger.lifecycle(
                "Athena META-INF/services merge injection disabled " +
                        "(-P${athenaBootstrapConfig.mergeServicesProperty}=false)."
        )
        return
    }

    plugins.withId('java') {
        def existingMergeTask = tasks.findByName('mergeServiceFiles')
        if (existingMergeTask != null) {
            logger.info("Athena bootstrap: found existing mergeServiceFiles task, skipping injection.")
            return
        }

        def mergeTaskName = athenaBootstrapConfig.mergeServicesTaskName
        def existingAthenaMergeTask = tasks.findByName(mergeTaskName)
        def mergeTaskProvider = existingAthenaMergeTask != null
                ? tasks.named(mergeTaskName)
                : tasks.register(mergeTaskName) {
            description = 'Merges META-INF/services entries for ServiceLoader discovery in the fat jar.'
            group = 'Build'

            def runtimeClasspath = configurations.findByName('runtimeClasspath')
            if (runtimeClasspath != null) {
                inputs.files(runtimeClasspath)
            }
            outputs.dir(file("$buildDir/athena/merged-services"))

            doLast {
                def outputDir = file("$buildDir/athena/merged-services")
                delete(outputDir)
                outputDir.mkdirs()

                def services = [:].withDefault { new LinkedHashSet<String>() }
                def collectServiceLines = { FileTree tree ->
                    tree.visit { details ->
                        if (details.isDirectory()) {
                            return
                        }
                        def relPath = details.relativePath.pathString
                        details.file.readLines('UTF-8').each { line ->
                            def trimmed = line.trim()
                            if (trimmed && !trimmed.startsWith('#')) {
                                services[relPath].add(trimmed)
                            }
                        }
                    }
                }

                def runtimeClasspathFiles = (configurations.findByName('runtimeClasspath')?.files ?: []) as Set<File>
                runtimeClasspathFiles.each { File dep ->
                    if (dep.isDirectory()) {
                        collectServiceLines(fileTree(dep).matching { include 'META-INF/services/**' })
                    } else if (dep.name.toLowerCase(Locale.ROOT).endsWith('.jar')) {
                        collectServiceLines(zipTree(dep).matching { include 'META-INF/services/**' })
                    }
                }

                services.each { relPath, lines ->
                    def outFile = new File(outputDir, relPath)
                    outFile.parentFile.mkdirs()
                    outFile.write(lines.join(System.lineSeparator()) + System.lineSeparator(), 'UTF-8')
                }
            }
        }

        tasks.named('jar').configure {
            dependsOn(mergeTaskProvider)
            from(file("$buildDir/athena/merged-services"))
        }
        logger.lifecycle("Athena bootstrap: injected META-INF/services merge into jar.")
    }
}
configureAthenaServiceMerge()

