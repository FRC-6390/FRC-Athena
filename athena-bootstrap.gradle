/*
 * Athena bootstrap (drop-in script)
 *
 * Team usage:
 *   apply from: "https://raw.githubusercontent.com/FRC-6390/FRC-Athena/refs/tags/<version>/gradle/athena-bootstrap.gradle"
 *
 * Tasks:
 *   athenaFindRepo  - print detected local FRC-Athena path
 *   athenaSync      - copy Athena vendordep JSON files from local FRC-Athena repo
 *   athenaBuild     - run Athena build tasks, then sync vendordeps
 *   athenaUpload    - deploy only src/main/deploy files to the roboRIO
 *   athenaDoctor    - print bootstrap health checks
 *   athenaConfigureVscode - apply VS Code settings needed for Athena DSL IntelliSense
 *
 * Optional properties:
 *   -PathenaRepoDir=/abs/path/to/FRC-Athena
 *   -PathenaBuildTasks=:athena-core:publishToMavenLocal,:athena-plugin:publishToMavenLocal
 *   -PathenaEnableDsl=true
 *   -PathenaPluginVersion=2026.1.67
 *   -PathenaVscodeJdtJavaHome=/abs/path/to/jdk24-or-newer
 *   -PathenaVscodeGradleJavaHome=/abs/path/to/gradle-compatible-jdk
 *   -PathenaMergeServices=false
 */

