def parseBoolean = { Object raw ->
    if (raw == null) {
        return false
    }
    String normalized = raw.toString().trim().toLowerCase(Locale.ROOT)
    return normalized == '1'
            || normalized == 'true'
            || normalized == 'yes'
            || normalized == 'on'
}

def parseBooleanOrDefault = { Object raw, boolean defaultValue ->
    return raw == null ? defaultValue : parseBoolean(raw)
}

def canonicalOrSelf = { File dir ->
    if (dir == null) {
        return null
    }
    try {
        return dir.canonicalFile
    } catch (IOException ignored) {
        return dir
    }
}

def readAthenaVersionFromVendordep = { File jsonFile ->
    if (jsonFile == null || !jsonFile.isFile()) {
        return null
    }
    def parsed = new JsonSlurper().parse(jsonFile)
    String version = parsed?.version?.toString()?.trim()
    return version ? version : null
}

def isLikelyAthenaRepo = { File dir ->
    if (dir == null || !dir.isDirectory()) {
        return false
    }
    def coreVendordep = new File(dir, "vendordeps/${athenaBootstrapConfig.athenaCoreVendordep}")
    def settingsGroovy = new File(dir, 'settings.gradle')
    def settingsKts = new File(dir, 'settings.gradle.kts')
    return coreVendordep.isFile() && (settingsGroovy.isFile() || settingsKts.isFile())
}

def collectAthenaCandidates = {
    def candidates = [] as List<File>
    def addCandidate = { File candidate ->
        def normalized = canonicalOrSelf(candidate)
        if (normalized == null) {
            return
        }
        if (!candidates.any { it.absolutePath == normalized.absolutePath }) {
            candidates << normalized
        }
    }

    def repoOverride = project.findProperty(athenaBootstrapConfig.repoDirProperty)?.toString()?.trim()
    if (repoOverride) {
        addCandidate(file(repoOverride))
    }

    def envOverride = System.getenv(athenaBootstrapConfig.repoDirEnv)?.toString()?.trim()
    if (envOverride) {
        addCandidate(file(envOverride))
    }

    def userHome = new File(System.getProperty('user.home'))
    addCandidate(new File(rootDir, '../FRC-Athena'))
    addCandidate(new File(rootDir, '../frc-athena'))
    addCandidate(new File(rootDir, '../../FRC-Athena'))
    addCandidate(new File(rootDir, '../../frc-athena'))
    addCandidate(new File(userHome, 'Documents/GitHub/FRC-Athena'))
    addCandidate(new File(userHome, 'GitHub/FRC-Athena'))

    [
            rootDir.parentFile,
            rootDir.parentFile?.parentFile,
            new File(userHome, 'Documents/GitHub'),
            new File(userHome, 'GitHub')
    ].findAll { it?.isDirectory() }.each { searchRoot ->
        searchRoot.listFiles()?.findAll { child ->
            child.isDirectory() && child.name.equalsIgnoreCase('FRC-Athena')
        }?.each { addCandidate(it) }
    }

    return candidates
}

def resolveAthenaRepoDir = { boolean required ->
    def candidates = collectAthenaCandidates()
    def match = candidates.find { isLikelyAthenaRepo(it) }
    if (match != null || !required) {
        return match
    }

    def tried = candidates
            ? candidates.collect { " - ${it}" }.join(System.lineSeparator())
            : ' - (no candidates found)'
    throw new GradleException(
            "Could not find FRC-Athena.\n" +
                    "Set -P${athenaBootstrapConfig.repoDirProperty}=<path> " +
                    "or ${athenaBootstrapConfig.repoDirEnv}=<path>.\n" +
                    "Searched:\n${tried}"
    )
}

def resolveAthenaPluginVersion = {
    def explicit = project.findProperty(athenaBootstrapConfig.pluginVersionProperty)?.toString()?.trim()
    if (explicit) {
        return explicit
    }

    def projectVendordep = file("$rootDir/vendordeps/${athenaBootstrapConfig.athenaCoreVendordep}")
    def vendordepVersion = readAthenaVersionFromVendordep(projectVendordep)
    if (vendordepVersion != null) {
        return vendordepVersion
    }

    File athenaRepo = resolveAthenaRepoDir(false)
    if (athenaRepo != null) {
        def repoVendordep = new File(athenaRepo, "vendordeps/${athenaBootstrapConfig.athenaCoreVendordep}")
        def repoVersion = readAthenaVersionFromVendordep(repoVendordep)
        if (repoVersion != null) {
            return repoVersion
        }
    }

    throw new GradleException(
            "Could not resolve Athena plugin version.\n" +
                    "Set -P${athenaBootstrapConfig.pluginVersionProperty}=<version>, " +
                    "install ${athenaBootstrapConfig.athenaCoreVendordep}, or provide a local FRC-Athena repo."
    )
}

def fileSha256 = { File file ->
    if (file == null || !file.isFile()) {
        return null
    }
    MessageDigest digest = MessageDigest.getInstance('SHA-256')
    file.withInputStream { input ->
        byte[] buffer = new byte[8192]
        int read
        while ((read = input.read(buffer)) >= 0) {
            if (read > 0) {
                digest.update(buffer, 0, read)
            }
        }
    }
    return digest.digest().collect { String.format('%02x', it) }.join()
}

def athenaEclipsePluginClasspathStatus = {
    File classpathFile = file("$rootDir/.classpath")
    if (!classpathFile.isFile()) {
        return [present: false, classpathFile: classpathFile]
    }

    String classpathText = classpathFile.getText('UTF-8')
    def matcher = classpathText =~ /path="([^"]*athena-plugin-[^"]+\.jar)"/
    if (!matcher.find()) {
        return [present: false, classpathFile: classpathFile]
    }

    String version = resolveAthenaPluginVersion()
    File mavenLocalJar = new File(
            System.getProperty('user.home'),
            ".m2/repository/ca/frc6390/athena/athena-plugin/${version}/athena-plugin-${version}.jar"
    )
    File classpathJar = new File(matcher.group(1))
    String classpathHash = fileSha256(classpathJar)
    String mavenLocalHash = fileSha256(mavenLocalJar)

    return [
            present          : true,
            classpathFile    : classpathFile,
            classpathJar     : classpathJar,
            classpathJarHash : classpathHash,
            mavenLocalJar    : mavenLocalJar,
            mavenLocalJarHash: mavenLocalHash,
            matchesMavenLocal: classpathHash != null && classpathHash == mavenLocalHash
    ]
}

def readAthenaVersionFromRepo = { File athenaRepo ->
    def coreJson = new File(athenaRepo, "vendordeps/${athenaBootstrapConfig.athenaCoreVendordep}")
    def version = readAthenaVersionFromVendordep(coreJson)
    if (version == null) {
        throw new GradleException("Could not read Athena version from ${coreJson}")
    }
    return version
}

def copyAthenaVendordeps = { File athenaRepo ->
    def sourceDir = new File(athenaRepo, 'vendordeps')
    def targetDir = file("$rootDir/vendordeps")
    if (!sourceDir.isDirectory()) {
        throw new GradleException("Missing Athena vendordeps directory: ${sourceDir}")
    }

    def allAthenaVendordeps = sourceDir.listFiles()?.findAll { vendordep ->
        if (!vendordep.isFile() || !(vendordep.name.toLowerCase(Locale.ROOT).endsWith('.json'))) {
            return false
        }
        return vendordep.name.startsWith(athenaBootstrapConfig.athenaVendorPrefix)
    }?.sort { it.name } ?: []
    def athenaByName = allAthenaVendordeps.collectEntries { [(it.name): it] }

    def explicitRaw = project.findProperty(athenaBootstrapConfig.vendordepsProperty)?.toString()?.trim()
    def includeAll = false
    def selectedNames = new LinkedHashSet<String>()
    if (explicitRaw) {
        explicitRaw.split(',').collect { it.trim() }.findAll { !it.isEmpty() }.each { token ->
            String normalized = token.toLowerCase(Locale.ROOT)
            if (normalized == 'all') {
                includeAll = true
                return
            }
            if (normalized == 'core') {
                selectedNames.add(athenaBootstrapConfig.athenaCoreVendordep)
                return
            }
            String canonical = "FRC6390-Athena-${token}.json"
            selectedNames.add(canonical)
        }
    } else {
        targetDir.mkdirs()
        def existingAthenaNames = targetDir.listFiles()?.findAll { candidate ->
            candidate.isFile() && candidate.name.startsWith(athenaBootstrapConfig.athenaVendorPrefix)
        }?.collect { it.name }?.sort() ?: []

        if (!existingAthenaNames.isEmpty()) {
            selectedNames.addAll(existingAthenaNames)
        } else {
            selectedNames.add(athenaBootstrapConfig.athenaCoreVendordep)
        }
    }

    def vendordepFiles = includeAll
            ? allAthenaVendordeps
            : selectedNames.collect { athenaByName[it] }.findAll { it != null }

    if (!includeAll) {
        def missing = selectedNames.findAll { !athenaByName.containsKey(it) }
        if (!missing.isEmpty()) {
            throw new GradleException(
                    "Requested Athena vendordep(s) not found in ${sourceDir}: ${missing.join(', ')}"
            )
        }
    }
    vendordepFiles = vendordepFiles.sort { it.name }

    if (!vendordepFiles || vendordepFiles.isEmpty()) {
        throw new GradleException(
                "No Athena vendordep files selected from ${sourceDir}. " +
                        "Use -P${athenaBootstrapConfig.vendordepsProperty}=core or all."
        )
    }

    targetDir.mkdirs()
    project.copy {
        from vendordepFiles
        into targetDir
    }

    if (vendordepFiles.any { it.name == 'FRC6390-Athena-Studica.json' }) {
        def legacyStudica = new File(targetDir, 'Studica-2026.0.0.json')
        if (legacyStudica.isFile()) {
            legacyStudica.delete()
        }
    }
    return vendordepFiles.collect { it.name }
}

def resolveAthenaBuildTasks = {
    def override = project.findProperty(athenaBootstrapConfig.buildTasksProperty)?.toString()?.trim()
    def rawTasks = override ? override.split(',') as List<String> : athenaBootstrapConfig.defaultBuildTasks
    def taskNames = rawTasks.collect { it.trim() }.findAll { !it.isEmpty() }
    if (taskNames.isEmpty()) {
        throw new GradleException(
                "No Athena build tasks resolved. Set -P${athenaBootstrapConfig.buildTasksProperty}=task1,task2"
        )
    }
    return taskNames
}

def runAthenaGradleCommand = { File athenaRepo, List<String> taskNames, List<String> extraArgs ->
    if (taskNames == null || taskNames.isEmpty()) {
        throw new GradleException("No Athena command tasks provided.")
    }

    def command = [] as List<String>
    if (System.getProperty('os.name').toLowerCase(Locale.ROOT).contains('win')) {
        command.addAll(['cmd', '/c', 'gradlew.bat'])
    } else {
        command.addAll(['bash', './gradlew'])
    }
    command.add('--console=plain')
    command.addAll(taskNames)
    if (extraArgs != null) {
        command.addAll(extraArgs.findAll { it != null && !it.toString().trim().isEmpty() })
    }

    logger.lifecycle("Running Athena build in ${athenaRepo}: ${command.join(' ')}")
    project.exec {
        workingDir athenaRepo
        commandLine command
    }
}

def runAthenaBuild = { File athenaRepo ->
    def taskNames = resolveAthenaBuildTasks()
    runAthenaGradleCommand(athenaRepo, taskNames, [])
}

def ensureAthenaPluginPublished = { File athenaRepo, String pluginVersion ->
    if (pluginVersion == null || pluginVersion.trim().isEmpty()) {
        throw new GradleException("Cannot publish Athena plugin without a resolved version.")
    }
    logger.lifecycle("Ensuring Athena Gradle plugin ${pluginVersion} is published to mavenLocal.")
    runAthenaGradleCommand(
            athenaRepo,
            [':athena-plugin:publishToMavenLocal'],
            ["-Pversion=${pluginVersion.trim()}"]
    )
}

def syncFromAthenaRepo = { File athenaRepo ->
    def version = readAthenaVersionFromRepo(athenaRepo)
    def vendordepNames = copyAthenaVendordeps(athenaRepo)
    logger.lifecycle("Athena repo: ${athenaRepo}")
    logger.lifecycle("Athena version: ${version}")
    logger.lifecycle("Copied ${vendordepNames.size()} vendordep file(s): ${vendordepNames.join(', ')}")
}

